server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SSE plain chat: disable buffering so tokens flush immediately (perceived latency).
    location /api/v1/agent/chat/stream {
        proxy_pass http://boardman:8090/api/v1/agent/chat/stream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        gzip off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # Agent chat + scans can exceed nginx defaults (60s) while Ollama/LangChain run.
    location /api/ {
        proxy_pass http://boardman:8090/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    location /docs {
        proxy_pass http://boardman:8090/docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://boardman:8090/openapi.json;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
