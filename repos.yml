# Repo → Plaky placement (API: Board -> Group -> Item). There is no separate "table" in the API.
# Keys: GitHub full name owner/repo
#
# defaults:
#   plaky_board_id: "..."   # optional; else PLAKY_DEFAULT_BOARD_ID
#   plaky_group_id: "..."   # optional; else PLAKY_DEFAULT_GROUP_ID
#   plaky_table: "Backlog"  # optional human label for issue/scan footers only
#
# repos:
#   org/repo:
#     category: backend
#     plaky_board_id: "..."
#     plaky_group_id: "..."

defaults:
  plaky_board_id: "269031"   # Plaky board "deepiri-boardman"
  plaky_group_id: "907471"   # group "Open PRs"
  plaky_table: "deepiri-boardman"

repos:
  Team-Deepiri/deepiri-boardman:
    category: automation
    plaky_board_id: "269031"
    plaky_group_id: "907471"
    description: GitHub <-> Plaky sync automation service (boardman)
    tier: 3
