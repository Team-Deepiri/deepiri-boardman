# Production cloud deployment: Boardman without local Ollama/model inference.
#
# Use this on a VPS when Boardman should receive GitHub webhooks, run background
# jobs, persist mappings/config, and talk to Plaky/GitHub. Local LLM inference is
# intentionally absent from this file; use a hosted LLM provider only if needed.

services:
  boardman:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: deepiri-boardman
    restart: unless-stopped
    ports:
      - "8090:8090"
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: "1"
      SERVICE_HOST: "0.0.0.0"
      SERVICE_PORT: "8090"
      DATABASE_URL: sqlite+aiosqlite:///./boardman.db
      PLAKY_API_BASE: ${PLAKY_API_BASE:-https://api.plaky.com/v1/public}
      PLAKY_PR_MERGE_STATUS: ${PLAKY_PR_MERGE_STATUS:-in_review}
      GITHUB_ORG: ${GITHUB_ORG:-deepiri-org}
      GITHUB_SUPPORT_TEAM: ${GITHUB_SUPPORT_TEAM:-Team-Deepiri/support-team}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      OLLAMA_BASE_URL: ""
      AGENT_LANGCHAIN_TOOLS: ${AGENT_LANGCHAIN_TOOLS:-true}
      AGENT_REDIS_URL: ${AGENT_REDIS_URL:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8088,http://127.0.0.1:8088}
    volumes:
      - ./boardman.db:/app/boardman.db
      - ./repos.yml:/app/repos.yml:ro
      - ./team_assignments.yml:/app/team_assignments.yml
    networks:
      - deepiri-network

  boardman-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: deepiri-boardman-worker
    restart: unless-stopped
    entrypoint: []
    command: ["python", "-m", "boardman.sqlite_worker"]
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: "1"
      DATABASE_URL: sqlite+aiosqlite:///./boardman.db
      PLAKY_API_BASE: ${PLAKY_API_BASE:-https://api.plaky.com/v1/public}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      OLLAMA_BASE_URL: ""
      AGENT_LANGCHAIN_TOOLS: ${AGENT_LANGCHAIN_TOOLS:-true}
      AGENT_REDIS_URL: ""
    volumes:
      - ./boardman.db:/app/boardman.db
      - ./repos.yml:/app/repos.yml:ro
      - ./team_assignments.yml:/app/team_assignments.yml:ro
    networks:
      - deepiri-network

  boardman-nginx:
    build:
      context: .
      dockerfile: deploy/nginx/Dockerfile
    container_name: deepiri-boardman-ui
    restart: unless-stopped
    ports:
      - "8088:80"
    depends_on:
      - boardman
    networks:
      - deepiri-network

  # Optional local agent cache: `docker compose -f docker-compose.prod.yml --profile agent-cache up -d`
  redis:
    profiles: ["agent-cache"]
    image: redis:7-alpine
    container_name: deepiri-boardman-redis-cache
    restart: unless-stopped
    networks:
      - deepiri-network

networks:
  deepiri-network:
    driver: bridge
