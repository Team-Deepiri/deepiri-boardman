# Ollama GPU: requires NVIDIA Container Toolkit (Linux/WSL2 with GPU) or Docker Desktop GPU.
# For CPU-only, remove the `gpus` block from the ollama service.
#
# Secrets (PLAKY_API_KEY, GITHUB_PAT, …): put them in `.env` next to this file.
# Do NOT use `KEY=${KEY}` here for secrets — an empty shell interpolation overrides `env_file`
# and wipes the key inside the container. Pass-through is either `env_file` only or `- KEY` list form.
#
# Ollama URL: boardman must use the Docker service hostname `ollama`, not localhost from `.env`.
# `${OLLAMA_BASE_URL:-…}` would still pick up `OLLAMA_BASE_URL=http://localhost:11434` from `.env`
# during compose interpolation and break LLM calls inside the container.

services:
  boardman:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: deepiri-boardman
    restart: unless-stopped
    ports:
      - "8090:8090"
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: "1"
      SERVICE_HOST: "0.0.0.0"
      SERVICE_PORT: "8090"
      DATABASE_URL: sqlite+aiosqlite:///./boardman.db
      OLLAMA_BASE_URL: http://ollama:11434
      PLAKY_API_BASE: ${PLAKY_API_BASE:-https://api.plaky.com/v1/public}
      PLAKY_PR_MERGE_STATUS: ${PLAKY_PR_MERGE_STATUS:-in_review}
      GITHUB_ORG: ${GITHUB_ORG:-deepiri-org}
      GITHUB_SUPPORT_TEAM: ${GITHUB_SUPPORT_TEAM:-Team-Deepiri/support-team}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      AGENT_LANGCHAIN_TOOLS: ${AGENT_LANGCHAIN_TOOLS:-true}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8088,http://127.0.0.1:8088}
      # Optional local agent cache; empty = in-process only (safe for prod). See AGENT_REDIS_URL in .env.example
      AGENT_REDIS_URL: ${AGENT_REDIS_URL:-}
    volumes:
      - ./boardman:/app/boardman
      - ./boardman.db:/app/boardman.db
      - ./repos.yml:/app/repos.yml:ro
    depends_on:
      - ollama
    networks:
      - deepiri-network

  boardman-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: deepiri-boardman-worker
    restart: unless-stopped
    entrypoint: []
    command: ["python", "-m", "boardman.sqlite_worker"]
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: "1"
      DATABASE_URL: sqlite+aiosqlite:///./boardman.db
      OLLAMA_BASE_URL: http://ollama:11434
      PLAKY_API_BASE: ${PLAKY_API_BASE:-https://api.plaky.com/v1/public}
      AGENT_LANGCHAIN_TOOLS: ${AGENT_LANGCHAIN_TOOLS:-true}
      # Worker must not use Redis; SQLite queue + in-memory / SQLite rate limits only.
      AGENT_REDIS_URL: ""
    volumes:
      - ./boardman:/app/boardman
      - ./boardman.db:/app/boardman.db
      - ./repos.yml:/app/repos.yml:ro
      - ./team_assignments.yml:/app/team_assignments.yml:ro
    depends_on:
      - ollama
    networks:
      - deepiri-network

  # Optional local agent cache: `docker compose --profile agent-cache up -d` then set AGENT_REDIS_URL in .env
  redis:
    profiles: ["agent-cache"]
    image: redis:7-alpine
    container_name: deepiri-boardman-redis-cache
    restart: unless-stopped
    networks:
      - deepiri-network

  boardman-nginx:
    build:
      context: .
      dockerfile: deploy/nginx/Dockerfile
    container_name: deepiri-boardman-ui
    restart: unless-stopped
    ports:
      - "8088:80"
    depends_on:
      - boardman
    networks:
      - deepiri-network

  ollama:
    image: ollama/ollama:latest
    container_name: deepiri-ollama-boardman
    restart: unless-stopped
    # GPU support - prioritized. Comment out the 'deploy' block below for pure CPU mode
    # if you encounter 'nvidia-container-cli' errors in WSL/Linux.
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    environment:
      - OLLAMA_NUM_PARALLEL=4
      - OLLAMA_MAX_LOADED_MODELS=2
      - OLLAMA_FLASH_ATTENTION=1
      - OLLAMA_CONTEXT_LENGTH=4096
      - OLLAMA_KEEP_ALIVE=30m
    networks:
      - deepiri-network

networks:
  deepiri-network:
    driver: bridge

volumes:
  ollama_models: