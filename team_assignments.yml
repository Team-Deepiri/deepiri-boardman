# Field keys for the default board (repos.yml defaults → Plaky board 269031 "deepiri-boardman"):
# person-3 = Assignee, person-4 = "QA Engineer Assigned". This board has no repo TAG column,
# so repo/github_repos stay empty (repo names still land in the description/comment footers).
plaky_field_keys:
  engineer: person-3
  qa: person-4
  repo: ''
  github_repos: ''
member_defaults:
  roles:
  - engineer
  - qa
  qa_tier: 3
  tier: standard
  repo_globs:
  - deepiri-org/*
  weight: 1.0
member_overrides:
  your-github-login:
    id: ''
    roles:
    - engineer
    - qa
    qa_tier: 3
hardware_tiers:
  light:
    weight_bias: 0.75
  standard:
    weight_bias: 1.0
  heavy:
    weight_bias: 1.15
repo_requirements:
  heavy_repo_patterns:
  - '*emotion*'
  - '*gpu*'
  - '*cuda*'
selection:
  random_jitter: 0.12
ambiguous_pr:
  enabled: false
  triage_board_id: ''
  triage_group_id: ''
  assign_qa: true
  title_template: "Triage: PR #{number} \u2014 {repo}"
