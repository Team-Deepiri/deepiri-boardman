plaky_field_keys:
  engineer: person-1
  qa: person-2
  repo: tag-2
  github_repos: tag-2
member_defaults:
  roles:
  - engineer
  - qa
  qa_tier: 3
  tier: standard
  repo_globs:
  - deepiri-org/*
  weight: 1.0
member_overrides:
  your-github-login:
    id: ''
    roles:
    - engineer
    - qa
    qa_tier: 3
hardware_tiers:
  light:
    weight_bias: 0.75
  standard:
    weight_bias: 1.0
  heavy:
    weight_bias: 1.15
repo_requirements:
  heavy_repo_patterns:
  - '*emotion*'
  - '*gpu*'
  - '*cuda*'
selection:
  random_jitter: 0.12
ambiguous_pr:
  enabled: false
  triage_board_id: ''
  triage_group_id: ''
  assign_qa: true
  title_template: "Triage: PR #{number} \u2014 {repo}"
